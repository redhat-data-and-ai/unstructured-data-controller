name: Lint

on:
  push:
    branches: [ main ]
  pull_request:
jobs:
  lint:
    name: GolangCILint and YAMLLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        name: checkout the code
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        name: setup go
        with:
          go-version-file: "go.mod"
          go-version: "1.25.x"
      - name: gofmt
        run: |
          make fmt
      - name: vet
        run: |
          make vet
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.4.0
          args: --timeout=10m
      - name: yamllint
        run: |
          apt update && apt install -y yamllint
          yamllint $(find . -path ./vendor -prune -o -type f -regex ".*y[a]ml" -print)
