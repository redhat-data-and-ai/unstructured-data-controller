apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: unstructured-datastore-cache
spec:
  # ReadWriteOnce: required for Kind (rancher.io/local-path) and other clusters that
  # do not support ReadWriteOncePod. Safe for single-replica controller-manager.
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 10Gi
