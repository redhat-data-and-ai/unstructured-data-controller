kind: Deployment
apiVersion: apps/v1
metadata:
  name: ollama-embedding
  labels:
    app: ollama-embedding
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama-embedding
  template:
    metadata:
      labels:
        app: ollama-embedding
    spec:
      restartPolicy: Always
      containers:
        - name: ollama
          image: ollama/ollama:latest
          imagePullPolicy: Always
          command:
            - ollama
            - serve
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          ports:
            - name: http
              containerPort: 11434
              protocol: TCP
          startupProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 11434
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
